<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats — A: Warm Instrument</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --surface-warm: #f5f0ea;
    --fg: #1a1612;
    --fg-muted: #8a7e72;
    --accent: #d4845a;
    --accent-glow: #e8a67a;
    --accent-soft: rgba(212, 132, 90, 0.12);
    --ring-track: #ece6de;
    --green: #5a9e6f;
    --amber: #c49a3c;
    --border: #e8e2da;
    --shadow: 0 1px 3px rgba(26, 22, 18, 0.06), 0 6px 16px rgba(26, 22, 18, 0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--fg);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 0 20px 100px;
  }

  h1, h2, .score-num { font-family: 'DM Serif Display', serif; }

  /* ─── Tab Bar ─── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface-warm);
    border-radius: 14px;
    padding: 4px;
    margin: 20px 0;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-muted);
    border: none;
    background: none;
    border-radius: 11px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .tab.active {
    background: var(--surface);
    color: var(--fg);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  /* ─── Score Ring ─── */
  .score-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 0 20px;
    position: relative;
  }
  .ring-container {
    position: relative;
    width: 180px;
    height: 180px;
  }
  .ring-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 10;
  }
  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    animation: ringFill 1.2s ease-out 0.3s forwards;
    filter: drop-shadow(0 0 8px var(--accent-glow));
  }
  @keyframes ringFill {
    to { stroke-dashoffset: 154; }
  }
  .score-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-num {
    font-size: 48px;
    line-height: 1;
    color: var(--fg);
    letter-spacing: -1px;
  }
  .score-label {
    font-size: 12px;
    color: var(--fg-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
  }
  .score-goal {
    font-size: 11px;
    color: var(--accent);
    margin-top: 12px;
    font-weight: 500;
  }

  /* ─── Metric Cards ─── */
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .metric::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .metric:hover::before { opacity: 1; }
  .metric-icon {
    font-size: 18px;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .metric-value {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    line-height: 1;
    color: var(--fg);
  }
  .metric-label {
    font-size: 11px;
    color: var(--fg-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }
  .metric.wide {
    grid-column: span 2;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .metric.wide .metric-value { font-size: 24px; }

  /* ─── Week Strip ─── */
  .week-section {
    margin: 20px 0;
  }
  .week-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    color: var(--fg-muted);
    margin-bottom: 14px;
  }
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .day-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .day-bar-track {
    width: 100%;
    height: 64px;
    background: var(--surface-warm);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }
  .day-bar-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--accent);
    border-radius: 8px;
    transition: height 0.6s ease;
    opacity: 0.8;
  }
  .day-bar-fill.today {
    background: var(--accent);
    opacity: 1;
    box-shadow: 0 -2px 8px var(--accent-glow);
  }
  .day-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--fg-muted);
  }
  .day-label.today { color: var(--accent); }
  .day-score {
    font-size: 10px;
    font-weight: 600;
    color: var(--fg);
  }

  /* ─── Week Stats Row ─── */
  .week-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 16px;
  }
  .week-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .week-stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--fg);
  }
  .week-stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg-muted);
    margin-top: 2px;
    font-weight: 500;
  }

  /* ─── Quick Actions ─── */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .action-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.25s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn.primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(212, 132, 90, 0.3);
  }
  .action-btn.secondary {
    background: var(--surface);
    color: var(--fg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  /* ─── Stagger animation ─── */
  .fade-up {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.5s ease forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.35s; }
  .delay-4 { animation-delay: 0.5s; }
  .delay-5 { animation-delay: 0.65s; }
</style>
</head>
<body>

<!-- Tabs -->
<div class="tabs fade-up">
  <button class="tab active">Stats</button>
  <button class="tab">Floors</button>
  <button class="tab">Walking</button>
  <button class="tab">Running</button>
</div>

<!-- Score Ring -->
<div class="score-section fade-up delay-1">
  <div class="ring-container">
    <svg class="ring-svg" viewBox="0 0 160 160">
      <circle class="ring-track" cx="80" cy="80" r="70" />
      <circle class="ring-fill" cx="80" cy="80" r="70" />
    </svg>
    <div class="score-inner">
      <span class="score-num">45.4</span>
      <span class="score-label">Score</span>
    </div>
  </div>
  <span class="score-goal">65% of daily goal</span>
</div>

<!-- Today's Metrics -->
<div class="metrics fade-up delay-2">
  <div class="metric">
    <div class="metric-icon">&#8593;</div>
    <div class="metric-value">10</div>
    <div class="metric-label">Floors Up</div>
  </div>
  <div class="metric">
    <div class="metric-icon">&#8595;</div>
    <div class="metric-value">7</div>
    <div class="metric-label">Floors Down</div>
  </div>
  <div class="metric">
    <div class="metric-icon">&#128694;</div>
    <div class="metric-value">6.4km</div>
    <div class="metric-label">Walked</div>
  </div>
  <div class="metric">
    <div class="metric-icon">&#127939;</div>
    <div class="metric-value">2.1km</div>
    <div class="metric-label">Run</div>
  </div>
</div>

<!-- Week Bar Chart -->
<div class="week-section fade-up delay-3">
  <div class="week-header">This Week</div>
  <div class="week-grid">
    <div class="day-col">
      <div class="day-score">6</div>
      <div class="day-bar-track"><div class="day-bar-fill" style="height: 29%"></div></div>
      <div class="day-label">Mon</div>
    </div>
    <div class="day-col">
      <div class="day-score">4.5</div>
      <div class="day-bar-track"><div class="day-bar-fill" style="height: 22%"></div></div>
      <div class="day-label">Tue</div>
    </div>
    <div class="day-col">
      <div class="day-score">20.5</div>
      <div class="day-bar-track"><div class="day-bar-fill" style="height: 100%"></div></div>
      <div class="day-label">Wed</div>
    </div>
    <div class="day-col">
      <div class="day-score">15.5</div>
      <div class="day-bar-track"><div class="day-bar-fill" style="height: 76%"></div></div>
      <div class="day-label">Thu</div>
    </div>
    <div class="day-col">
      <div class="day-score">13.5</div>
      <div class="day-bar-track"><div class="day-bar-fill" style="height: 66%"></div></div>
      <div class="day-label">Fri</div>
    </div>
    <div class="day-col">
      <div class="day-score">15.5</div>
      <div class="day-bar-track"><div class="day-bar-fill" style="height: 76%"></div></div>
      <div class="day-label">Sat</div>
    </div>
    <div class="day-col">
      <div class="day-score">45</div>
      <div class="day-bar-track"><div class="day-bar-fill today" style="height: 90%"></div></div>
      <div class="day-label today">Sun</div>
    </div>
  </div>
</div>

<!-- Week Summary -->
<div class="week-stats fade-up delay-4">
  <div class="week-stat">
    <div class="week-stat-value">11.6</div>
    <div class="week-stat-label">Avg Score</div>
  </div>
  <div class="week-stat">
    <div class="week-stat-value">81.5</div>
    <div class="week-stat-label">Total</div>
  </div>
  <div class="week-stat">
    <div class="week-stat-value">7d</div>
    <div class="week-stat-label">Streak</div>
  </div>
</div>

<!-- Quick Actions -->
<div class="actions fade-up delay-5">
  <button class="action-btn primary">+ Log Floors</button>
  <button class="action-btn secondary">+ Walk</button>
  <button class="action-btn secondary">+ Run</button>
</div>

</body>
</html>
