<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFP Theme Gallery — Final 10</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Orbitron:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Quicksand:wght@400;600;700&family=Nunito:wght@400;600;700&family=DM+Serif+Display&family=Playfair+Display:wght@400;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', system-ui, sans-serif;
    background: #f5f5f5;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  .page-wrap {
    max-width: 1200px;
    margin: 0 auto;
  }

  .page-title {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  .page-subtitle {
    font-size: 0.95rem;
    color: #666;
    margin-bottom: 40px;
    line-height: 1.5;
  }

  .section-header {
    font-size: 1.05rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 12px 0 16px;
    border-bottom: 2px solid #ddd;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header.dark-section {
    color: #aaa;
    border-color: #2a2a34;
  }

  .section-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .section-count {
    font-size: 0.7rem;
    font-weight: 600;
    opacity: 0.5;
    margin-left: 2px;
  }

  /* Grid */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
    margin-bottom: 48px;
  }

  @media (max-width: 1060px) {
    .theme-grid { grid-template-columns: 1fr; max-width: 560px; margin-left: auto; margin-right: auto; }
    .page-title { font-size: 1.6rem; }
  }

  /* Dark Region */
  .dark-region {
    background: #0e0e14;
    margin: 0 -24px;
    padding: 44px 24px 52px;
  }

  .dark-region .page-wrap-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Theme Card */
  .theme-card {
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
  }

  .theme-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.18);
  }

  .theme-card-inner {
    padding: 22px 20px 18px;
    position: relative;
    z-index: 0;
  }

  /* Badges */
  .badge-row {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
    z-index: 3;
  }

  .badge {
    font-size: 0.58rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 6px;
    line-height: 1.3;
  }

  .badge-dark {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .badge-new {
    background: rgba(16, 185, 129, 0.14);
    color: #10b981;
    border: 1px solid rgba(16, 185, 129, 0.25);
  }

  .badge-new-light {
    background: rgba(16, 185, 129, 0.1);
    color: #059669;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  /* Theme Header */
  .theme-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .theme-name {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .theme-family {
    display: inline-block;
    font-size: 0.58rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 5px;
  }

  /* Score Ring */
  .score-section {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .score-ring-wrap {
    position: relative;
    width: 68px;
    height: 68px;
    flex-shrink: 0;
  }

  .score-ring-wrap svg {
    width: 68px;
    height: 68px;
    transform: rotate(-90deg);
  }

  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.15rem;
  }

  .score-label {
    font-size: 0.65rem;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }

  .score-summary {
    font-size: 0.75rem;
    opacity: 0.6;
    line-height: 1.4;
  }

  /* Stat Cards */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .stat-card {
    border-radius: 10px;
    padding: 10px 12px;
  }

  .stat-card-label {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.55;
    margin-bottom: 4px;
  }

  .stat-card-value {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-card-unit {
    font-size: 0.55rem;
    opacity: 0.4;
    margin-left: 2px;
  }

  /* Mini Bar Chart */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 40px;
    margin-bottom: 4px;
    padding: 0 2px;
  }

  .bar-chart .bar {
    flex: 1;
    border-radius: 3px 3px 0 0;
    min-height: 3px;
    transition: opacity 0.15s;
  }

  .bar-chart .bar:hover {
    opacity: 0.7;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.48rem;
    opacity: 0.35;
    margin-bottom: 12px;
    padding: 0 2px;
  }

  /* List Row */
  .list-row {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }

  .list-row:hover .hover-add {
    opacity: 1;
    transform: scale(1);
  }

  .list-row-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    margin-right: 10px;
    flex-shrink: 0;
  }

  .list-row-text {
    flex: 1;
    min-width: 0;
  }

  .list-row-title {
    font-size: 0.72rem;
    font-weight: 600;
    line-height: 1.2;
  }

  .list-row-sub {
    font-size: 0.56rem;
    opacity: 0.45;
  }

  .list-row-value {
    font-size: 0.8rem;
    font-weight: 700;
    margin-right: 8px;
  }

  .hover-add {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.2s, transform 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  /* CRT Scanlines */
  .crt-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.05) 2px,
      rgba(0, 0, 0, 0.05) 4px
    );
    border-radius: 16px;
  }

  /* ── Ambient Effects ─────────────────────────────────────── */

  .fx-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
    border-radius: 16px;
  }

  /* Deep Mariana: Rising bubbles */
  @keyframes bubble-rise {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    8%   { opacity: 0.6; }
    85%  { opacity: 0.3; }
    100% { transform: translateY(-500px) translateX(25px); opacity: 0; }
  }

  @keyframes bubble-rise-drift {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 0.5; }
    80%  { opacity: 0.2; }
    100% { transform: translateY(-500px) translateX(-18px); opacity: 0; }
  }

  .fx-bubble {
    position: absolute;
    bottom: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,232,154,0.35) 0%, transparent 70%);
  }

  .fx-bubble-1 {
    width: 7px; height: 7px;
    left: 15%;
    animation: bubble-rise 4.5s ease-in infinite;
  }

  .fx-bubble-2 {
    width: 4px; height: 4px;
    left: 40%;
    animation: bubble-rise-drift 5.5s ease-in 1s infinite;
  }

  .fx-bubble-3 {
    width: 5px; height: 5px;
    left: 65%;
    animation: bubble-rise 4s ease-in 2.5s infinite;
  }

  .fx-bubble-4 {
    width: 3px; height: 3px;
    left: 85%;
    animation: bubble-rise-drift 5s ease-in 0.5s infinite;
  }

  .fx-bubble-5 {
    width: 6px; height: 6px;
    left: 50%;
    animation: bubble-rise 6s ease-in 3.5s infinite;
  }

  /* Industrial Furnace: Rising embers */
  @keyframes ember-rise {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    12%  { opacity: 0.9; }
    45%  { opacity: 0.6; }
    100% { transform: translateY(-500px) translateX(-18px); opacity: 0; }
  }

  @keyframes ember-rise-drift {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 0.8; }
    50%  { opacity: 0.4; }
    100% { transform: translateY(-500px) translateX(12px); opacity: 0; }
  }

  .fx-ember {
    position: absolute;
    bottom: -5px;
    border-radius: 50%;
  }

  .fx-ember-1 {
    width: 3.5px; height: 3.5px;
    left: 12%;
    background: #ff6820;
    animation: ember-rise 3.5s ease-out infinite;
  }

  .fx-ember-2 {
    width: 2px; height: 2px;
    left: 35%;
    background: #ffaa30;
    animation: ember-rise-drift 4.5s ease-out 0.8s infinite;
  }

  .fx-ember-3 {
    width: 3px; height: 3px;
    left: 58%;
    background: #ff8830;
    animation: ember-rise 4s ease-out 2s infinite;
  }

  .fx-ember-4 {
    width: 2.5px; height: 2.5px;
    left: 78%;
    background: #ff6820;
    animation: ember-rise-drift 3.8s ease-out 1.2s infinite;
  }

  .fx-ember-5 {
    width: 1.5px; height: 1.5px;
    left: 92%;
    background: #ffcc40;
    animation: ember-rise 5s ease-out 3s infinite;
  }

  /* Neon Glow: Scanline sweep */
  @keyframes scanline-sweep {
    0%   { top: -2px; opacity: 0; }
    5%   { opacity: 0.2; }
    95%  { opacity: 0.06; }
    100% { top: 100%; opacity: 0; }
  }

  .fx-scanline {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,184,3,0.4), transparent);
    animation: scanline-sweep 3.5s linear infinite;
  }

  /* Family Blue: Snowflakes — soft gray-blue flakes drifting down */
  @keyframes snowflake-fall {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    8% { opacity: 0.7; }
    80% { opacity: 0.4; }
    100% { transform: translateY(500px) translateX(20px) rotate(360deg); opacity: 0; }
  }

  @keyframes snowflake-fall-drift {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    75% { opacity: 0.3; }
    100% { transform: translateY(500px) translateX(-25px) rotate(-270deg); opacity: 0; }
  }

  .fx-snowflake {
    position: absolute;
    top: -10px;
    color: rgba(96,165,250,0.5);
    font-size: 14px;
    line-height: 1;
  }

  .fx-snowflake-1 { left: 12%; font-size: 16px; animation: snowflake-fall 5s ease-in infinite; }
  .fx-snowflake-2 { left: 38%; font-size: 12px; color: rgba(148,163,184,0.5); animation: snowflake-fall-drift 7s ease-in 1.5s infinite; }
  .fx-snowflake-3 { left: 62%; font-size: 14px; animation: snowflake-fall 6s ease-in 3s infinite; }
  .fx-snowflake-4 { left: 85%; font-size: 10px; color: rgba(148,163,184,0.4); animation: snowflake-fall-drift 5.5s ease-in 0.5s infinite; }
  .fx-snowflake-5 { left: 50%; font-size: 13px; animation: snowflake-fall 8s ease-in 4s infinite; }

  /* Garden Path: Leaves — leaf emoji drifting down with rotation */
  @keyframes leaf-fall {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    8% { opacity: 0.8; }
    75% { opacity: 0.5; }
    100% { transform: translateY(500px) translateX(35px) rotate(200deg); opacity: 0; }
  }

  @keyframes leaf-fall-drift {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    80% { opacity: 0.4; }
    100% { transform: translateY(500px) translateX(-25px) rotate(-160deg); opacity: 0; }
  }

  .fx-leaf {
    position: absolute;
    top: -14px;
    font-size: 14px;
    line-height: 1;
    opacity: 0;
  }

  .fx-leaf-1 { left: 15%; font-size: 16px; animation: leaf-fall 5.5s ease-in infinite; }
  .fx-leaf-2 { left: 45%; font-size: 12px; animation: leaf-fall-drift 7s ease-in 2s infinite; }
  .fx-leaf-3 { left: 75%; font-size: 15px; animation: leaf-fall 6s ease-in 3.5s infinite; }
  .fx-leaf-4 { left: 30%; font-size: 11px; animation: leaf-fall-drift 5s ease-in 1s infinite; }
  .fx-leaf-5 { left: 60%; font-size: 13px; animation: leaf-fall 7.5s ease-in 5s infinite; }

  /* Lullaby: Stars — soft golden stars twinkling and floating */
  @keyframes star-twinkle {
    0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
    30% { opacity: 0.8; transform: scale(1) rotate(20deg); }
    70% { opacity: 0.6; transform: scale(0.9) rotate(-10deg); }
  }

  @keyframes star-drift {
    0%, 100% { opacity: 0; transform: translateY(0) scale(0.4); }
    20% { opacity: 0.7; transform: translateY(-10px) scale(1.1); }
    60% { opacity: 0.5; transform: translateY(-25px) scale(0.8); }
  }

  .fx-star {
    position: absolute;
    font-size: 14px;
    line-height: 1;
  }

  .fx-star-1 { top: 18%; left: 20%; font-size: 16px; animation: star-twinkle 3.5s ease infinite; }
  .fx-star-2 { top: 45%; left: 65%; font-size: 12px; animation: star-drift 4.5s ease 1s infinite; }
  .fx-star-3 { top: 70%; left: 35%; font-size: 14px; animation: star-twinkle 4s ease 2s infinite; }
  .fx-star-4 { top: 30%; left: 82%; font-size: 11px; animation: star-drift 3.5s ease 0.5s infinite; }
  .fx-star-5 { top: 58%; left: 12%; font-size: 13px; animation: star-twinkle 5s ease 3s infinite; }

  /* Rose Quartz: Hearts & Stars — pink hearts and sparkle stars */
  @keyframes heart-float {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    15% { opacity: 0.7; transform: translateY(-10px) scale(1); }
    60% { opacity: 0.5; transform: translateY(-60px) scale(0.9); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.6); }
  }

  @keyframes star-sparkle-rq {
    0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
    40% { opacity: 0.8; transform: scale(1.2) rotate(30deg); }
    70% { opacity: 0.5; transform: scale(0.8) rotate(-15deg); }
  }

  .fx-heart {
    position: absolute;
    font-size: 14px;
    line-height: 1;
  }

  .fx-heart-1 { bottom: 20%; left: 18%; font-size: 16px; animation: heart-float 4s ease infinite; }
  .fx-heart-2 { bottom: 30%; left: 55%; font-size: 12px; animation: heart-float 5s ease 1.5s infinite; }
  .fx-heart-3 { bottom: 15%; left: 80%; font-size: 14px; animation: heart-float 4.5s ease 3s infinite; }
  .fx-heart-4 { bottom: 40%; left: 35%; font-size: 11px; animation: heart-float 5.5s ease 0.8s infinite; }

  .fx-rq-star {
    position: absolute;
    font-size: 12px;
    line-height: 1;
  }

  .fx-rq-star-1 { top: 15%; left: 25%; font-size: 14px; animation: star-sparkle-rq 3s ease infinite; }
  .fx-rq-star-2 { top: 55%; left: 72%; font-size: 10px; animation: star-sparkle-rq 4s ease 2s infinite; }
  .fx-rq-star-3 { top: 35%; left: 88%; font-size: 12px; animation: star-sparkle-rq 3.5s ease 1s infinite; }

  /* Marauder's Map: Footprints — ink footstep pairs appearing/fading */
  @keyframes ink-appear {
    0%, 100% { opacity: 0; transform: scale(0); }
    12% { opacity: 0.7; transform: scale(1); }
    55% { opacity: 0.5; transform: scale(1); }
    85% { opacity: 0; transform: scale(0.7); }
  }

  .fx-ink {
    position: absolute;
    font-size: 12px;
    line-height: 1;
  }

  .fx-ink-1 { top: 20%; left: 25%; font-size: 14px; animation: ink-appear 3s ease infinite; }
  .fx-ink-2 { top: 38%; left: 58%; font-size: 11px; transform: rotate(30deg); animation: ink-appear 3.5s ease 0.8s infinite; }
  .fx-ink-3 { top: 55%; left: 18%; font-size: 13px; transform: rotate(-20deg); animation: ink-appear 4s ease 1.8s infinite; }
  .fx-ink-4 { top: 32%; left: 78%; font-size: 10px; transform: rotate(45deg); animation: ink-appear 3s ease 2.5s infinite; }
  .fx-ink-5 { top: 72%; left: 45%; font-size: 12px; transform: rotate(-10deg); animation: ink-appear 3.5s ease 0.3s infinite; }
  .fx-ink-6 { top: 48%; left: 38%; font-size: 11px; transform: rotate(60deg); animation: ink-appear 4.5s ease 1.2s infinite; }

  /* Expecto Patronum: Wisps — silvery mist + ghostly sparkle */
  @keyframes wisp-rise {
    0% { transform: translateY(0) translateX(0) scaleX(1); opacity: 0; }
    12% { opacity: 0.45; }
    50% { transform: translateY(-150px) translateX(18px) scaleX(1.8); opacity: 0.3; }
    100% { transform: translateY(-400px) translateX(-10px) scaleX(2.5); opacity: 0; }
  }

  @keyframes wisp-rise-slow {
    0% { transform: translateY(0) translateX(0) scaleX(1); opacity: 0; }
    10% { opacity: 0.4; }
    55% { transform: translateY(-180px) translateX(-15px) scaleX(1.5); opacity: 0.25; }
    100% { transform: translateY(-450px) translateX(10px) scaleX(2); opacity: 0; }
  }

  @keyframes ghost-sparkle {
    0%, 100% { opacity: 0; transform: scale(0.3); }
    40% { opacity: 0.6; transform: scale(1.1); }
    70% { opacity: 0.3; transform: scale(0.8); }
  }

  .fx-wisp {
    position: absolute;
    bottom: 5%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,212,232,0.35) 0%, transparent 70%);
  }

  .fx-wisp-1 { width: 30px; height: 12px; left: 10%; animation: wisp-rise 5.5s ease infinite; }
  .fx-wisp-2 { width: 22px; height: 9px; left: 40%; animation: wisp-rise-slow 7s ease 1.5s infinite; }
  .fx-wisp-3 { width: 28px; height: 10px; left: 65%; animation: wisp-rise 6s ease 3s infinite; }
  .fx-wisp-4 { width: 18px; height: 8px; left: 25%; animation: wisp-rise-slow 5s ease 0.5s infinite; }

  .fx-ghost-star {
    position: absolute;
    font-size: 12px;
    line-height: 1;
    color: rgba(184,212,232,0.5);
  }

  .fx-ghost-star-1 { top: 20%; left: 22%; font-size: 14px; animation: ghost-sparkle 3.5s ease infinite; }
  .fx-ghost-star-2 { top: 45%; left: 70%; font-size: 10px; animation: ghost-sparkle 4s ease 1.5s infinite; }
  .fx-ghost-star-3 { top: 65%; left: 40%; font-size: 12px; animation: ghost-sparkle 3s ease 2.5s infinite; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .fx-bubble, .fx-ember, .fx-scanline,
    .fx-snowflake, .fx-leaf, .fx-star,
    .fx-heart, .fx-rq-star, .fx-ink,
    .fx-wisp, .fx-ghost-star {
      animation: none !important;
      display: none;
    }
  }

  /* Footer */
  .showcase-footer {
    text-align: center;
    padding: 44px 0 0;
    font-size: 0.75rem;
    color: #999;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="page-wrap">
  <h1 class="page-title">AFP Theme Gallery &mdash; Final 10 (16 variants)</h1>
  <p class="page-subtitle">Each card is a mini Body Stats dashboard rendered in its theme's exact colors, fonts, and personality. Light themes show both light and dark variants.</p>

  <div class="section-header">
    <span class="section-dot" style="background: #60a5fa"></span>
    Light Themes <span class="section-count">(6)</span>
  </div>

  <div class="theme-grid" id="light-grid"></div>
</div>

<div class="dark-region">
  <div class="page-wrap-inner">
    <div class="section-header dark-section">
      <span class="section-dot" style="background: #ff6820"></span>
      Dark Themes <span class="section-count">(10)</span>
    </div>

    <div class="theme-grid" id="dark-grid"></div>
  </div>
</div>

<div class="page-wrap">
  <div class="showcase-footer">

  // ── Helpers ──

  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
  }

  function el(tag, className, styles) {
    var node = document.createElement(tag);
    if (className) { node.className = className; }
    if (styles) {
      var keys = Object.keys(styles);
      for (var i = 0; i < keys.length; i++) {
        node.style[keys[i]] = styles[keys[i]];
      }
    }
    return node;
  }

  function txt(str) {
    return document.createTextNode(str);
  }

  function svgEl(tag) {
    return document.createElementNS('http://www.w3.org/2000/svg', tag);
  }

  // ── Build Badge Row ──

  function buildBadgeRow(t) {
    if (!t.badges || t.badges.length === 0) { return null; }
    var isDark = t.group === 'dark';
    var row = el('div', 'badge-row');
    for (var i = 0; i < t.badges.length; i++) {
      var b = t.badges[i];
      var span = el('span', 'badge');
      if (b === 'dark') {
        span.className += ' badge-dark';
        span.appendChild(txt('Dark Only'));
      } else if (b === 'new') {
        span.className += isDark ? ' badge-new' : ' badge-new-light';
        span.appendChild(txt('New'));
      }
      row.appendChild(span);
    }
    return row;
  }

  // ── Build Score Ring (SVG) ──

  function buildScoreRing(t) {
    var RADIUS = 30;
    var STROKE = 5;
    var CIRC = 2 * Math.PI * RADIUS;
    var SCORE = 52;
    var dashOffset = CIRC * (1 - SCORE / 100);
    var trackColor = hexToRgba(t.accent, 0.15);

    var wrap = el('div', 'score-ring-wrap');

    var svg = svgEl('svg');
    svg.setAttribute('viewBox', '0 0 68 68');

    var trackCircle = svgEl('circle');
    trackCircle.setAttribute('cx', '34');
    trackCircle.setAttribute('cy', '34');
    trackCircle.setAttribute('r', String(RADIUS));
    trackCircle.setAttribute('fill', 'none');
    trackCircle.setAttribute('stroke', trackColor);
    trackCircle.setAttribute('stroke-width', String(STROKE));

    var progressCircle = svgEl('circle');
    progressCircle.setAttribute('cx', '34');
    progressCircle.setAttribute('cy', '34');
    progressCircle.setAttribute('r', String(RADIUS));
    progressCircle.setAttribute('fill', 'none');
    progressCircle.setAttribute('stroke', t.accent);
    progressCircle.setAttribute('stroke-width', String(STROKE));
    progressCircle.setAttribute('stroke-linecap', 'round');
    progressCircle.setAttribute('stroke-dasharray', String(CIRC));
    progressCircle.setAttribute('stroke-dashoffset', String(dashOffset));

    svg.appendChild(trackCircle);
    svg.appendChild(progressCircle);
    wrap.appendChild(svg);

    var num = el('div', 'score-number', {
      color: t.text,
      fontFamily: "'" + t.headingFont + "', sans-serif"
    });
    num.appendChild(txt(String(SCORE)));
    wrap.appendChild(num);

    return wrap;
  }

  // ── Build Score Section ──

  function buildScoreSection(t) {
    var section = el('div', 'score-section');

    section.appendChild(buildScoreRing(t));

    var info = el('div');

    var label = el('div', 'score-label', {
      color: t.muted,
      fontFamily: "'" + t.bodyFont + "', sans-serif"
    });
    label.appendChild(txt('Daily Score'));

    var summary = el('div', 'score-summary', {
      color: t.text,
      fontFamily: "'" + t.bodyFont + "', sans-serif"
    });
    summary.appendChild(txt('12 floors \u00B7 2.0 km \u00B7 Day 7'));

    info.appendChild(label);
    info.appendChild(summary);
    section.appendChild(info);

    return section;
  }

  // ── Build Stat Cards (2x2) ──

  function buildStatCards(t) {
    var statBg = hexToRgba(t.accent, 0.08);
    var statBorder = hexToRgba(t.accent, 0.12);

    var stats = [
      { label: 'Floors Up', value: '12', unit: 'fl' },
      { label: 'Walked', value: '1.2', unit: 'km' },
      { label: 'Run', value: '0.8', unit: 'km' },
      { label: 'Streak', value: '7', unit: 'd' }
    ];

    var grid = el('div', 'stat-grid');

    for (var i = 0; i < stats.length; i++) {
      var s = stats[i];
      var card = el('div', 'stat-card', {
        background: statBg,
        border: '1px solid ' + statBorder
      });

      var lbl = el('div', 'stat-card-label', { color: t.muted });
      lbl.appendChild(txt(s.label));

      var val = el('div', 'stat-card-value', {
        color: i === 3 ? t.accent : t.text,
        fontFamily: "'" + t.headingFont + "', sans-serif"
      });
      val.appendChild(txt(s.value));

      var unit = el('span', 'stat-card-unit', { color: t.muted });
      unit.appendChild(txt(s.unit));
      val.appendChild(unit);

      card.appendChild(lbl);
      card.appendChild(val);
      grid.appendChild(card);
    }

    return grid;
  }

  // ── Build Bar Chart ──

  function buildBarChart(t) {
    var days = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
    var heights = [30, 45, 80, 65, 50, 75, 90];

    var frag = document.createDocumentFragment();

    var chart = el('div', 'bar-chart');
    for (var i = 0; i < heights.length; i++) {
      var barOpacity = (i === heights.length - 1) ? '1' : '0.6';
      var bar = el('div', 'bar', {
        height: heights[i] + '%',
        background: t.accent,
        opacity: barOpacity
      });
      chart.appendChild(bar);
    }
    frag.appendChild(chart);

    var labels = el('div', 'bar-labels', { color: t.muted });
    for (var j = 0; j < days.length; j++) {
      var span = el('span');
      span.appendChild(txt(days[j]));
      labels.appendChild(span);
    }
    frag.appendChild(labels);

    return frag;
  }

  // ── Build List Row ──

  function buildListRow(t) {
    var isDark = t.group === 'dark';
    var iconBg = hexToRgba(t.accent, 0.12);
    var hoverBg = hexToRgba(t.accent, 0.06);
    var addBtnText = isDark ? t.bg : '#ffffff';

    var row = el('div', 'list-row', {
      border: '1px solid ' + t.border,
      background: t.card
    });
    row.addEventListener('mouseenter', function () {
      row.style.background = hoverBg;
    });
    row.addEventListener('mouseleave', function () {
      row.style.background = t.card;
    });

    var icon = el('div', 'list-row-icon', {
      background: iconBg,
      color: t.accent
    });
    icon.appendChild(txt('\uD83D\uDEB6'));

    var textWrap = el('div', 'list-row-text');

    var title = el('div', 'list-row-title', { color: t.text });
    title.appendChild(txt('Morning Walk'));

    var sub = el('div', 'list-row-sub', { color: t.muted });
    sub.appendChild(txt('1.2 km'));

    textWrap.appendChild(title);
    textWrap.appendChild(sub);

    var value = el('div', 'list-row-value', { color: t.text });
    value.appendChild(txt('1.2 km'));

    var addBtn = el('div', 'hover-add', {
      background: t.accent,
      color: addBtnText
    });
    addBtn.appendChild(txt('+'));

    row.appendChild(icon);
    row.appendChild(textWrap);
    row.appendChild(value);
    row.appendChild(addBtn);

    return row;
  }

  // ── Build Theme Card ──

  function buildThemeCard(t) {
    var isDark = t.group === 'dark';
    var shadow = isDark
      ? '0 2px 8px rgba(0,0,0,0.5), 0 0 0 1px ' + t.border
      : '0 2px 16px rgba(0,0,0,0.07), 0 0 0 1px ' + t.border;

    var familyBg = hexToRgba(t.accent, 0.1);
    var familyBorder = hexToRgba(t.accent, 0.2);

    var card = el('div', 'theme-card', {
      background: t.card,
      boxShadow: shadow,
      border: '1px solid ' + t.border
    });

    // Badges
    var badgeRow = buildBadgeRow(t);
    if (badgeRow) { card.appendChild(badgeRow); }

    // CRT overlay
    if (t.crt) {
      var crt = el('div', 'crt-overlay');
      card.appendChild(crt);
    }

    // Ambient effects
    if (t.effects && t.effects.length > 0) {
      var fxContainer = el('div', 'fx-container');
      for (var e = 0; e < t.effects.length; e++) {
        var effect = t.effects[e];
        if (effect === 'bubbles') {
          for (var b = 1; b <= 5; b++) fxContainer.appendChild(el('div', 'fx-bubble fx-bubble-' + b));
        } else if (effect === 'embers') {
          for (var m = 1; m <= 5; m++) fxContainer.appendChild(el('div', 'fx-ember fx-ember-' + m));
        } else if (effect === 'scanline') {
          fxContainer.appendChild(el('div', 'fx-scanline'));
        } else if (effect === 'snowflakes') {
          var flakes = ['\u2744', '\u2022', '\u2744', '\u2022', '\u2744'];
          for (var s = 0; s < 5; s++) {
            var sf = el('div', 'fx-snowflake fx-snowflake-' + (s + 1));
            sf.appendChild(txt(flakes[s]));
            fxContainer.appendChild(sf);
          }
        } else if (effect === 'leaves') {
          var leafChars = ['\uD83C\uDF42', '\uD83C\uDF43', '\uD83C\uDF41', '\uD83C\uDF43', '\uD83C\uDF42'];
          for (var l = 0; l < 5; l++) {
            var lf = el('div', 'fx-leaf fx-leaf-' + (l + 1));
            lf.appendChild(txt(leafChars[l]));
            fxContainer.appendChild(lf);
          }
        } else if (effect === 'stars') {
          var starChars = ['\u2B50', '\u2728', '\u2B50', '\u2728', '\u2B50'];
          for (var d = 0; d < 5; d++) {
            var st = el('div', 'fx-star fx-star-' + (d + 1));
            st.appendChild(txt(starChars[d]));
            fxContainer.appendChild(st);
          }
        } else if (effect === 'hearts') {
          var heartChars = ['\uD83D\uDC96', '\u2764', '\uD83D\uDC95', '\u2764'];
          for (var h = 0; h < 4; h++) {
            var hf = el('div', 'fx-heart fx-heart-' + (h + 1));
            hf.appendChild(txt(heartChars[h]));
            fxContainer.appendChild(hf);
          }
          var rqStarChars = ['\u2728', '\u2B50', '\u2728'];
          for (var rs = 0; rs < 3; rs++) {
            var rss = el('div', 'fx-rq-star fx-rq-star-' + (rs + 1));
            rss.appendChild(txt(rqStarChars[rs]));
            fxContainer.appendChild(rss);
          }
        } else if (effect === 'ink') {
          var inkChars = ['\uD83D\uDC63', '\uD83D\uDC63', '\uD83D\uDC63', '\uD83D\uDC63', '\uD83D\uDC63', '\uD83D\uDC63'];
          for (var k = 0; k < 6; k++) {
            var kf = el('div', 'fx-ink fx-ink-' + (k + 1));
            kf.appendChild(txt(inkChars[k]));
            fxContainer.appendChild(kf);
          }
        } else if (effect === 'wisps') {
          for (var w = 1; w <= 4; w++) fxContainer.appendChild(el('div', 'fx-wisp fx-wisp-' + w));
          var ghostChars = ['\u2728', '\u2B50', '\u2728'];
          for (var g = 0; g < 3; g++) {
            var gf = el('div', 'fx-ghost-star fx-ghost-star-' + (g + 1));
            gf.appendChild(txt(ghostChars[g]));
            fxContainer.appendChild(gf);
          }
        }
      }
      card.appendChild(fxContainer);
    }

    // Inner container
    var inner = el('div', 'theme-card-inner', { background: t.bg });

    // Header
    var header = el('div', 'theme-header');

    var headerLeft = el('div');

    var name = el('div', 'theme-name', {
      color: t.text,
      fontFamily: "'" + t.headingFont + "', sans-serif"
    });
    name.appendChild(txt(t.name));

    var family = el('div', 'theme-family', {
      background: familyBg,
      color: t.accent,
      border: '1px solid ' + familyBorder
    });
    family.appendChild(txt(t.family));

    headerLeft.appendChild(name);
    headerLeft.appendChild(family);
    header.appendChild(headerLeft);

    inner.appendChild(header);

    // Score section
    inner.appendChild(buildScoreSection(t));

    // Stat cards
    inner.appendChild(buildStatCards(t));

    // Bar chart
    inner.appendChild(buildBarChart(t));

    // List row
    inner.appendChild(buildListRow(t));

    card.appendChild(inner);

    return card;
  }

  // ── Render All ──

  var lightGrid = document.getElementById('light-grid');
  var darkGrid = document.getElementById('dark-grid');
  var lightCount = 0;
  var darkCount = 0;

  for (var i = 0; i < themes.length; i++) {
    var t = themes[i];
    var card = buildThemeCard(t);
    if (t.group === 'light') {
      lightGrid.appendChild(card);
      lightCount++;
    } else if (t.group === 'dark') {
      darkGrid.appendChild(card);
      darkCount++;
    }
  }

  // Verify all 10 rendered
  var totalRendered = lightCount + darkCount;
  if (totalRendered !== 10) {
    console.error('Theme render mismatch: expected 10, got ' + totalRendered);
  } else {
    console.log('All 10 themes rendered successfully (' + lightCount + ' light, ' + darkCount + ' dark)');
  }

})();
</script>
