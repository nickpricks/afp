<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFP Theme Gallery — Final 10</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Orbitron:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Quicksand:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', system-ui, sans-serif;
    background: #f5f5f5;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  .page-wrap {
    max-width: 1200px;
    margin: 0 auto;
  }

  .page-title {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  .page-subtitle {
    font-size: 0.95rem;
    color: #666;
    margin-bottom: 40px;
    line-height: 1.5;
  }

  .section-header {
    font-size: 1.05rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 12px 0 16px;
    border-bottom: 2px solid #ddd;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header.dark-section {
    color: #aaa;
    border-color: #2a2a34;
  }

  .section-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .section-count {
    font-size: 0.7rem;
    font-weight: 600;
    opacity: 0.5;
    margin-left: 2px;
  }

  /* Grid */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
    margin-bottom: 48px;
  }

  @media (max-width: 1060px) {
    .theme-grid { grid-template-columns: 1fr; max-width: 560px; margin-left: auto; margin-right: auto; }
    .page-title { font-size: 1.6rem; }
  }

  /* Dark Region */
  .dark-region {
    background: #0e0e14;
    margin: 0 -24px;
    padding: 44px 24px 52px;
  }

  .dark-region .page-wrap-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Theme Card */
  .theme-card {
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
  }

  .theme-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.18);
  }

  .theme-card-inner {
    padding: 22px 20px 18px;
    position: relative;
    z-index: 0;
  }

  /* Badges */
  .badge-row {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
    z-index: 3;
  }

  .badge {
    font-size: 0.58rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 6px;
    line-height: 1.3;
  }

  .badge-dark {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .badge-new {
    background: rgba(16, 185, 129, 0.14);
    color: #10b981;
    border: 1px solid rgba(16, 185, 129, 0.25);
  }

  .badge-new-light {
    background: rgba(16, 185, 129, 0.1);
    color: #059669;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  /* Theme Header */
  .theme-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .theme-name {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .theme-family {
    display: inline-block;
    font-size: 0.58rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 5px;
  }

  /* Score Ring */
  .score-section {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .score-ring-wrap {
    position: relative;
    width: 68px;
    height: 68px;
    flex-shrink: 0;
  }

  .score-ring-wrap svg {
    width: 68px;
    height: 68px;
    transform: rotate(-90deg);
  }

  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.15rem;
  }

  .score-label {
    font-size: 0.65rem;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }

  .score-summary {
    font-size: 0.75rem;
    opacity: 0.6;
    line-height: 1.4;
  }

  /* Stat Cards */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .stat-card {
    border-radius: 10px;
    padding: 10px 12px;
  }

  .stat-card-label {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.55;
    margin-bottom: 4px;
  }

  .stat-card-value {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-card-unit {
    font-size: 0.55rem;
    opacity: 0.4;
    margin-left: 2px;
  }

  /* Mini Bar Chart */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 40px;
    margin-bottom: 4px;
    padding: 0 2px;
  }

  .bar-chart .bar {
    flex: 1;
    border-radius: 3px 3px 0 0;
    min-height: 3px;
    transition: opacity 0.15s;
  }

  .bar-chart .bar:hover {
    opacity: 0.7;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.48rem;
    opacity: 0.35;
    margin-bottom: 12px;
    padding: 0 2px;
  }

  /* List Row */
  .list-row {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }

  .list-row:hover .hover-add {
    opacity: 1;
    transform: scale(1);
  }

  .list-row-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    margin-right: 10px;
    flex-shrink: 0;
  }

  .list-row-text {
    flex: 1;
    min-width: 0;
  }

  .list-row-title {
    font-size: 0.72rem;
    font-weight: 600;
    line-height: 1.2;
  }

  .list-row-sub {
    font-size: 0.56rem;
    opacity: 0.45;
  }

  .list-row-value {
    font-size: 0.8rem;
    font-weight: 700;
    margin-right: 8px;
  }

  .hover-add {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.2s, transform 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  /* CRT Scanlines */
  .crt-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.05) 2px,
      rgba(0, 0, 0, 0.05) 4px
    );
    border-radius: 16px;
  }

  /* Footer */
  .showcase-footer {
    text-align: center;
    padding: 44px 0 0;
    font-size: 0.75rem;
    color: #999;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="page-wrap">
  <h1 class="page-title">AFP Theme Gallery &mdash; Final 10</h1>
  <p class="page-subtitle">Each card is a mini Body Stats dashboard rendered in its theme's exact colors, fonts, and personality.</p>

  <div class="section-header">
    <span class="section-dot" style="background: #60a5fa"></span>
    Light Themes <span class="section-count">(6)</span>
  </div>

  <div class="theme-grid" id="light-grid"></div>
</div>

<div class="dark-region">
  <div class="page-wrap-inner">
    <div class="section-header dark-section">
      <span class="section-dot" style="background: #ff6820"></span>
      Dark Themes <span class="section-count">(4)</span>
    </div>

    <div class="theme-grid" id="dark-grid"></div>
  </div>
</div>

<div class="page-wrap">
  <div class="showcase-footer">
    AFP &middot; "It Started On April Fools Day" &middot; Final 10 Themes &middot; April 2026
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── Theme Definitions ──
  var themes = [
    {
      name: 'Family Blue',
      family: 'Family',
      group: 'light',
      bg: '#f0f7ff',
      card: '#ffffff',
      accent: '#60a5fa',
      text: '#1e293b',
      muted: '#94a3b8',
      border: '#cbd5e1',
      headingFont: 'Syne',
      bodyFont: 'system-ui',
      badges: []
    },
    {
      name: 'Garden Path',
      family: 'Nature',
      group: 'light',
      bg: '#f4f9f4',
      card: '#ffffff',
      accent: '#16a34a',
      text: '#1a2e1a',
      muted: '#6b8a6b',
      border: '#d4e5d4',
      headingFont: 'Syne',
      bodyFont: 'system-ui',
      badges: ['new']
    },
    {
      name: 'Lullaby',
      family: 'Nursery',
      group: 'light',
      bg: '#faf6ef',
      card: '#ffffff',
      accent: '#e8a44a',
      text: '#3d3529',
      muted: '#8a7e6e',
      border: '#e8dfd2',
      headingFont: 'Quicksand',
      bodyFont: 'Nunito',
      badges: ['new']
    },
    {
      name: 'Rose Quartz',
      family: 'Soft',
      group: 'light',
      bg: '#fdf2f8',
      card: '#ffffff',
      accent: '#f472b6',
      text: '#2e1a24',
      muted: '#8a6a7a',
      border: '#e8d0dc',
      headingFont: 'Syne',
      bodyFont: 'system-ui',
      badges: ['new']
    },
    {
      name: 'Charcoal',
      family: 'Minimal',
      group: 'light',
      bg: '#fafafa',
      card: '#ffffff',
      accent: '#71717a',
      text: '#18181b',
      muted: '#a1a1aa',
      border: '#e4e4e7',
      headingFont: 'Syne',
      bodyFont: 'JetBrains Mono',
      badges: ['new']
    },
    {
      name: "Marauder's Map",
      family: 'Magic',
      group: 'light',
      bg: '#f5f0e0',
      card: '#fffdf5',
      accent: '#c8a96e',
      text: '#3a2e1a',
      muted: '#8a7a5a',
      border: '#ddd0b0',
      headingFont: 'Syne',
      bodyFont: 'JetBrains Mono',
      badges: ['new']
    },
    {
      name: 'Neon Glow',
      family: 'Cyberpunk',
      group: 'dark',
      bg: '#0d0505',
      card: '#141010',
      accent: '#ffb803',
      text: '#d0d0d0',
      muted: '#505050',
      border: '#2a2020',
      headingFont: 'Orbitron',
      bodyFont: 'JetBrains Mono',
      badges: ['dark']
    },
    {
      name: 'Deep Mariana',
      family: 'Deep',
      group: 'dark',
      bg: '#030b12',
      card: '#071520',
      accent: '#00e89a',
      text: '#8cb4c8',
      muted: '#2a4f62',
      border: '#0c2535',
      headingFont: 'Syne',
      bodyFont: 'JetBrains Mono',
      badges: ['dark'],
      crt: true
    },
    {
      name: 'Industrial Furnace',
      family: 'Industrial',
      group: 'dark',
      bg: '#100804',
      card: '#1a0f08',
      accent: '#ff6820',
      text: '#c8a888',
      muted: '#584030',
      border: '#2a1a10',
      headingFont: 'Syne',
      bodyFont: 'JetBrains Mono',
      badges: ['dark']
    },
    {
      name: 'Expecto Patronum',
      family: 'Magic',
      group: 'dark',
      bg: '#080a10',
      card: '#0e1218',
      accent: '#b8d4e8',
      text: '#90a8b8',
      muted: '#4a5a68',
      border: '#182028',
      headingFont: 'Syne',
      bodyFont: 'JetBrains Mono',
      badges: ['dark', 'new']
    }
  ];

  // ── Helpers ──

  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
  }

  function el(tag, className, styles) {
    var node = document.createElement(tag);
    if (className) { node.className = className; }
    if (styles) {
      var keys = Object.keys(styles);
      for (var i = 0; i < keys.length; i++) {
        node.style[keys[i]] = styles[keys[i]];
      }
    }
    return node;
  }

  function txt(str) {
    return document.createTextNode(str);
  }

  function svgEl(tag) {
    return document.createElementNS('http://www.w3.org/2000/svg', tag);
  }

  // ── Build Badge Row ──

  function buildBadgeRow(t) {
    if (!t.badges || t.badges.length === 0) { return null; }
    var isDark = t.group === 'dark';
    var row = el('div', 'badge-row');
    for (var i = 0; i < t.badges.length; i++) {
      var b = t.badges[i];
      var span = el('span', 'badge');
      if (b === 'dark') {
        span.className += ' badge-dark';
        span.appendChild(txt('Dark Only'));
      } else if (b === 'new') {
        span.className += isDark ? ' badge-new' : ' badge-new-light';
        span.appendChild(txt('New'));
      }
      row.appendChild(span);
    }
    return row;
  }

  // ── Build Score Ring (SVG) ──

  function buildScoreRing(t) {
    var RADIUS = 30;
    var STROKE = 5;
    var CIRC = 2 * Math.PI * RADIUS;
    var SCORE = 52;
    var dashOffset = CIRC * (1 - SCORE / 100);
    var trackColor = hexToRgba(t.accent, 0.15);

    var wrap = el('div', 'score-ring-wrap');

    var svg = svgEl('svg');
    svg.setAttribute('viewBox', '0 0 68 68');

    var trackCircle = svgEl('circle');
    trackCircle.setAttribute('cx', '34');
    trackCircle.setAttribute('cy', '34');
    trackCircle.setAttribute('r', String(RADIUS));
    trackCircle.setAttribute('fill', 'none');
    trackCircle.setAttribute('stroke', trackColor);
    trackCircle.setAttribute('stroke-width', String(STROKE));

    var progressCircle = svgEl('circle');
    progressCircle.setAttribute('cx', '34');
    progressCircle.setAttribute('cy', '34');
    progressCircle.setAttribute('r', String(RADIUS));
    progressCircle.setAttribute('fill', 'none');
    progressCircle.setAttribute('stroke', t.accent);
    progressCircle.setAttribute('stroke-width', String(STROKE));
    progressCircle.setAttribute('stroke-linecap', 'round');
    progressCircle.setAttribute('stroke-dasharray', String(CIRC));
    progressCircle.setAttribute('stroke-dashoffset', String(dashOffset));

    svg.appendChild(trackCircle);
    svg.appendChild(progressCircle);
    wrap.appendChild(svg);

    var num = el('div', 'score-number', {
      color: t.text,
      fontFamily: "'" + t.headingFont + "', sans-serif"
    });
    num.appendChild(txt(String(SCORE)));
    wrap.appendChild(num);

    return wrap;
  }

  // ── Build Score Section ──

  function buildScoreSection(t) {
    var section = el('div', 'score-section');

    section.appendChild(buildScoreRing(t));

    var info = el('div');

    var label = el('div', 'score-label', {
      color: t.muted,
      fontFamily: "'" + t.bodyFont + "', sans-serif"
    });
    label.appendChild(txt('Daily Score'));

    var summary = el('div', 'score-summary', {
      color: t.text,
      fontFamily: "'" + t.bodyFont + "', sans-serif"
    });
    summary.appendChild(txt('12 floors \u00B7 2.0 km \u00B7 Day 7'));

    info.appendChild(label);
    info.appendChild(summary);
    section.appendChild(info);

    return section;
  }

  // ── Build Stat Cards (2x2) ──

  function buildStatCards(t) {
    var statBg = hexToRgba(t.accent, 0.08);
    var statBorder = hexToRgba(t.accent, 0.12);

    var stats = [
      { label: 'Floors Up', value: '12', unit: 'fl' },
      { label: 'Walked', value: '1.2', unit: 'km' },
      { label: 'Run', value: '0.8', unit: 'km' },
      { label: 'Streak', value: '7', unit: 'd' }
    ];

    var grid = el('div', 'stat-grid');

    for (var i = 0; i < stats.length; i++) {
      var s = stats[i];
      var card = el('div', 'stat-card', {
        background: statBg,
        border: '1px solid ' + statBorder
      });

      var lbl = el('div', 'stat-card-label', { color: t.muted });
      lbl.appendChild(txt(s.label));

      var val = el('div', 'stat-card-value', {
        color: i === 3 ? t.accent : t.text,
        fontFamily: "'" + t.headingFont + "', sans-serif"
      });
      val.appendChild(txt(s.value));

      var unit = el('span', 'stat-card-unit', { color: t.muted });
      unit.appendChild(txt(s.unit));
      val.appendChild(unit);

      card.appendChild(lbl);
      card.appendChild(val);
      grid.appendChild(card);
    }

    return grid;
  }

  // ── Build Bar Chart ──

  function buildBarChart(t) {
    var days = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
    var heights = [30, 45, 80, 65, 50, 75, 90];

    var frag = document.createDocumentFragment();

    var chart = el('div', 'bar-chart');
    for (var i = 0; i < heights.length; i++) {
      var barOpacity = (i === heights.length - 1) ? '1' : '0.6';
      var bar = el('div', 'bar', {
        height: heights[i] + '%',
        background: t.accent,
        opacity: barOpacity
      });
      chart.appendChild(bar);
    }
    frag.appendChild(chart);

    var labels = el('div', 'bar-labels', { color: t.muted });
    for (var j = 0; j < days.length; j++) {
      var span = el('span');
      span.appendChild(txt(days[j]));
      labels.appendChild(span);
    }
    frag.appendChild(labels);

    return frag;
  }

  // ── Build List Row ──

  function buildListRow(t) {
    var isDark = t.group === 'dark';
    var iconBg = hexToRgba(t.accent, 0.12);
    var hoverBg = hexToRgba(t.accent, 0.06);
    var addBtnText = isDark ? t.bg : '#ffffff';

    var row = el('div', 'list-row', {
      border: '1px solid ' + t.border,
      background: t.card
    });
    row.addEventListener('mouseenter', function () {
      row.style.background = hoverBg;
    });
    row.addEventListener('mouseleave', function () {
      row.style.background = t.card;
    });

    var icon = el('div', 'list-row-icon', {
      background: iconBg,
      color: t.accent
    });
    icon.appendChild(txt('\uD83D\uDEB6'));

    var textWrap = el('div', 'list-row-text');

    var title = el('div', 'list-row-title', { color: t.text });
    title.appendChild(txt('Morning Walk'));

    var sub = el('div', 'list-row-sub', { color: t.muted });
    sub.appendChild(txt('1.2 km'));

    textWrap.appendChild(title);
    textWrap.appendChild(sub);

    var value = el('div', 'list-row-value', { color: t.text });
    value.appendChild(txt('1.2 km'));

    var addBtn = el('div', 'hover-add', {
      background: t.accent,
      color: addBtnText
    });
    addBtn.appendChild(txt('+'));

    row.appendChild(icon);
    row.appendChild(textWrap);
    row.appendChild(value);
    row.appendChild(addBtn);

    return row;
  }

  // ── Build Theme Card ──

  function buildThemeCard(t) {
    var isDark = t.group === 'dark';
    var shadow = isDark
      ? '0 2px 8px rgba(0,0,0,0.5), 0 0 0 1px ' + t.border
      : '0 2px 16px rgba(0,0,0,0.07), 0 0 0 1px ' + t.border;

    var familyBg = hexToRgba(t.accent, 0.1);
    var familyBorder = hexToRgba(t.accent, 0.2);

    var card = el('div', 'theme-card', {
      background: t.card,
      boxShadow: shadow,
      border: '1px solid ' + t.border
    });

    // Badges
    var badgeRow = buildBadgeRow(t);
    if (badgeRow) { card.appendChild(badgeRow); }

    // CRT overlay
    if (t.crt) {
      var crt = el('div', 'crt-overlay');
      card.appendChild(crt);
    }

    // Inner container
    var inner = el('div', 'theme-card-inner', { background: t.bg });

    // Header
    var header = el('div', 'theme-header');

    var headerLeft = el('div');

    var name = el('div', 'theme-name', {
      color: t.text,
      fontFamily: "'" + t.headingFont + "', sans-serif"
    });
    name.appendChild(txt(t.name));

    var family = el('div', 'theme-family', {
      background: familyBg,
      color: t.accent,
      border: '1px solid ' + familyBorder
    });
    family.appendChild(txt(t.family));

    headerLeft.appendChild(name);
    headerLeft.appendChild(family);
    header.appendChild(headerLeft);

    inner.appendChild(header);

    // Score section
    inner.appendChild(buildScoreSection(t));

    // Stat cards
    inner.appendChild(buildStatCards(t));

    // Bar chart
    inner.appendChild(buildBarChart(t));

    // List row
    inner.appendChild(buildListRow(t));

    card.appendChild(inner);

    return card;
  }

  // ── Render All ──

  var lightGrid = document.getElementById('light-grid');
  var darkGrid = document.getElementById('dark-grid');
  var lightCount = 0;
  var darkCount = 0;

  for (var i = 0; i < themes.length; i++) {
    var t = themes[i];
    var card = buildThemeCard(t);
    if (t.group === 'light') {
      lightGrid.appendChild(card);
      lightCount++;
    } else if (t.group === 'dark') {
      darkGrid.appendChild(card);
      darkCount++;
    }
  }

  // Verify all 10 rendered
  var totalRendered = lightCount + darkCount;
  if (totalRendered !== 10) {
    console.error('Theme render mismatch: expected 10, got ' + totalRendered);
  } else {
    console.log('All 10 themes rendered successfully (' + lightCount + ' light, ' + darkCount + ' dark)');
  }

})();
</script>

</body>
</html>
