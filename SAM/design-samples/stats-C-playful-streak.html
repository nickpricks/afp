<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats — C: Playful Streak</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --surface-hover: #1c222b;
    --fg: #e6edf3;
    --fg-muted: #7d8590;
    --accent: #3fb950;
    --accent-glow: rgba(63, 185, 80, 0.2);
    --orange: #f0883e;
    --orange-glow: rgba(240, 136, 62, 0.15);
    --blue: #58a6ff;
    --blue-glow: rgba(88, 166, 255, 0.12);
    --border: #30363d;
    --purple: #bc8cff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Bricolage Grotesque', sans-serif;
    background: var(--bg);
    color: var(--fg);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 0 16px 100px;
  }

  code, .mono { font-family: 'JetBrains Mono', monospace; }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--fg-muted);
    background: none;
    border: 1px solid transparent;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--fg);
    background: var(--surface);
    border-color: var(--border);
  }

  /* ─── Streak Banner ─── */
  .streak-banner {
    margin: 20px 0;
    padding: 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(240, 136, 62, 0.1) 0%, rgba(240, 136, 62, 0.02) 100%);
    border: 1px solid rgba(240, 136, 62, 0.2);
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .streak-banner::before {
    content: '';
    position: absolute;
    top: -20px;
    right: -20px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, var(--orange-glow), transparent 70%);
    border-radius: 50%;
  }
  .streak-fire {
    font-size: 40px;
    line-height: 1;
    animation: fireWiggle 2s ease-in-out infinite;
  }
  @keyframes fireWiggle {
    0%, 100% { transform: rotate(-3deg) scale(1); }
    50% { transform: rotate(3deg) scale(1.05); }
  }
  .streak-info { flex: 1; }
  .streak-count {
    font-size: 32px;
    font-weight: 800;
    color: var(--orange);
    line-height: 1;
  }
  .streak-label {
    font-size: 13px;
    color: var(--fg-muted);
    margin-top: 4px;
  }
  .streak-dots {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .streak-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    background: var(--orange);
    opacity: 0.8;
  }
  .streak-dot.future {
    background: var(--border);
    opacity: 0.4;
  }

  /* ─── Score Card ─── */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .score-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--blue), var(--purple));
  }
  .score-level {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .score-value {
    font-size: 64px;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--fg) 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .score-subtitle {
    font-size: 13px;
    color: var(--fg-muted);
    margin-top: 8px;
  }
  .xp-bar {
    margin-top: 16px;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .xp-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    border-radius: 4px;
    animation: xpGrow 1s ease 0.4s forwards;
  }
  @keyframes xpGrow { to { width: 65%; } }
  .xp-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 11px;
    color: var(--fg-muted);
  }

  /* ─── Stat Chips ─── */
  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 16px 0;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .stat-chip:hover { border-color: var(--fg-muted); }
  .chip-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .chip-icon.green { background: var(--accent-glow); }
  .chip-icon.blue { background: var(--blue-glow); }
  .chip-icon.orange { background: var(--orange-glow); }
  .chip-icon.purple { background: rgba(188, 140, 255, 0.12); }
  .chip-value {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }
  .chip-label {
    font-size: 11px;
    color: var(--fg-muted);
    margin-top: 2px;
  }

  /* ─── Activity Heatmap ─── */
  .heatmap-section {
    margin: 20px 0;
  }
  .section-head {
    font-size: 14px;
    font-weight: 600;
    color: var(--fg-muted);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .heatmap-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .heat-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
  }
  .heat-cell.l1 { background: rgba(63, 185, 80, 0.15); border-color: rgba(63, 185, 80, 0.2); }
  .heat-cell.l2 { background: rgba(63, 185, 80, 0.3); border-color: rgba(63, 185, 80, 0.35); }
  .heat-cell.l3 { background: rgba(63, 185, 80, 0.5); border-color: rgba(63, 185, 80, 0.55); }
  .heat-cell.l4 { background: var(--accent); border-color: var(--accent); }
  .heat-cell.today {
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }
  .heat-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 6px;
  }
  .heat-label {
    text-align: center;
    font-size: 10px;
    color: var(--fg-muted);
    font-weight: 500;
  }

  /* ─── Week Summary Chips ─── */
  .week-chips {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 16px 0;
  }
  .week-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .wc-value {
    font-size: 20px;
    font-weight: 800;
  }
  .wc-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg-muted);
    margin-top: 2px;
    font-weight: 500;
  }

  /* ─── Actions ─── */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .action-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: transform 0.12s, box-shadow 0.25s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn.primary {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .action-btn.ghost {
    background: var(--surface);
    color: var(--fg);
    border: 1px solid var(--border);
  }

  /* ─── Stagger ─── */
  .pop {
    opacity: 0;
    transform: translateY(10px) scale(0.98);
    animation: pop 0.35s ease forwards;
  }
  @keyframes pop { to { opacity: 1; transform: none; } }
  .d1 { animation-delay: 0.05s; }
  .d2 { animation-delay: 0.12s; }
  .d3 { animation-delay: 0.2s; }
  .d4 { animation-delay: 0.3s; }
  .d5 { animation-delay: 0.4s; }
  .d6 { animation-delay: 0.5s; }
  .d7 { animation-delay: 0.6s; }
</style>
</head>
<body>

<nav class="tabs pop">
  <button class="tab active">Stats</button>
  <button class="tab">Floors</button>
  <button class="tab">Walking</button>
  <button class="tab">Running</button>
</nav>

<!-- Streak -->
<div class="streak-banner pop d1">
  <div class="streak-fire">&#128293;</div>
  <div class="streak-info">
    <div class="streak-count">7 day streak</div>
    <div class="streak-label">Your longest this month</div>
    <div class="streak-dots">
      <div class="streak-dot"></div>
      <div class="streak-dot"></div>
      <div class="streak-dot"></div>
      <div class="streak-dot"></div>
      <div class="streak-dot"></div>
      <div class="streak-dot"></div>
      <div class="streak-dot"></div>
    </div>
  </div>
</div>

<!-- Score -->
<div class="score-card pop d2">
  <div class="score-level">Today's Score</div>
  <div class="score-value">45.4</div>
  <div class="score-subtitle">65% toward daily goal of 70</div>
  <div class="xp-bar"><div class="xp-fill"></div></div>
  <div class="xp-labels">
    <span>0</span>
    <span class="mono" style="color: var(--accent);">45.4 / 70</span>
    <span>70</span>
  </div>
</div>

<!-- Stat Chips -->
<div class="stat-row pop d3">
  <div class="stat-chip">
    <div class="chip-icon green">&#8593;</div>
    <div>
      <div class="chip-value">10</div>
      <div class="chip-label">Floors Up</div>
    </div>
  </div>
  <div class="stat-chip">
    <div class="chip-icon blue">&#8595;</div>
    <div>
      <div class="chip-value">7</div>
      <div class="chip-label">Floors Down</div>
    </div>
  </div>
</div>
<div class="stat-row pop d4">
  <div class="stat-chip">
    <div class="chip-icon orange">&#128694;</div>
    <div>
      <div class="chip-value">6.4km</div>
      <div class="chip-label">Walked</div>
    </div>
  </div>
  <div class="stat-chip">
    <div class="chip-icon purple">&#127939;</div>
    <div>
      <div class="chip-value">2.1km</div>
      <div class="chip-label">Run</div>
    </div>
  </div>
</div>

<!-- Heatmap -->
<div class="heatmap-section pop d5">
  <div class="section-head">Activity</div>
  <div class="heatmap-row">
    <div class="heat-cell l1"></div>
    <div class="heat-cell l2"></div>
    <div class="heat-cell"></div>
    <div class="heat-cell l3"></div>
    <div class="heat-cell l1"></div>
    <div class="heat-cell l2"></div>
    <div class="heat-cell l4"></div>
  </div>
  <div class="heatmap-row" style="margin-top: 4px;">
    <div class="heat-cell l2"></div>
    <div class="heat-cell l1"></div>
    <div class="heat-cell l4"></div>
    <div class="heat-cell l3"></div>
    <div class="heat-cell l2"></div>
    <div class="heat-cell l3"></div>
    <div class="heat-cell l4 today"></div>
  </div>
  <div class="heat-labels">
    <span class="heat-label">M</span>
    <span class="heat-label">T</span>
    <span class="heat-label">W</span>
    <span class="heat-label">T</span>
    <span class="heat-label">F</span>
    <span class="heat-label">S</span>
    <span class="heat-label" style="color: var(--accent);">S</span>
  </div>
</div>

<!-- Week Summary -->
<div class="week-chips pop d6">
  <div class="week-chip">
    <div class="wc-value" style="color: var(--blue);">11.6</div>
    <div class="wc-label">Avg</div>
  </div>
  <div class="week-chip">
    <div class="wc-value">81.5</div>
    <div class="wc-label">Total</div>
  </div>
  <div class="week-chip">
    <div class="wc-value" style="color: var(--orange);">7d</div>
    <div class="wc-label">Streak</div>
  </div>
</div>

<!-- Actions -->
<div class="actions pop d7">
  <button class="action-btn primary">+ Floors</button>
  <button class="action-btn ghost">+ Walk</button>
  <button class="action-btn ghost">+ Run</button>
</div>

</body>
</html>
