<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats — B: Dense Editorial</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f0ed;
    --surface: #faf9f7;
    --fg: #141210;
    --fg-secondary: #5c564e;
    --fg-muted: #9e9589;
    --accent: #1a6b4a;
    --accent-light: #e5f2ec;
    --accent-text: #0d4f34;
    --warm: #c4713b;
    --warm-light: #fef3ec;
    --border: #ddd8d0;
    --border-strong: #c5beb4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--fg);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 0 16px 100px;
  }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    border-bottom: 2px solid var(--border);
    margin: 16px 0 0;
    gap: 0;
  }
  .tab {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--fg-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--fg);
    border-bottom-color: var(--fg);
  }

  /* ─── Hero Score ─── */
  .hero {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
  }
  .hero-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .hero-score {
    font-family: 'Fraunces', serif;
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -3px;
    color: var(--fg);
  }
  .hero-unit {
    font-size: 16px;
    font-weight: 600;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .hero-sub {
    margin-top: 8px;
    font-size: 13px;
    color: var(--fg-secondary);
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-green { background: var(--accent-light); color: var(--accent-text); }
  .badge-warm { background: var(--warm-light); color: var(--warm); }

  /* ─── Data Grid ─── */
  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1px 1fr 1px 1fr 1px 1fr;
    border-bottom: 1px solid var(--border);
  }
  .data-divider {
    background: var(--border);
    align-self: stretch;
    margin: 16px 0;
  }
  .data-cell {
    padding: 20px 8px;
    text-align: center;
  }
  .data-value {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--fg);
    line-height: 1;
  }
  .data-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--fg-muted);
    margin-top: 6px;
  }

  /* ─── Week Table ─── */
  .week-section {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
  }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
  }
  .section-link {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .week-table {
    width: 100%;
    border-collapse: collapse;
  }
  .week-table th {
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg-muted);
    padding: 0 0 10px;
    border-bottom: 1px solid var(--border);
  }
  .week-table th:not(:first-child) { text-align: right; }
  .week-table td {
    padding: 10px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--bg);
  }
  .week-table td:not(:first-child) {
    text-align: right;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 15px;
  }
  .week-table tr.today td {
    color: var(--accent-text);
    font-weight: 700;
  }
  .week-table tr.today td:first-child::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }
  .day-name { color: var(--fg-secondary); font-weight: 500; }
  .day-name-muted { color: var(--fg-muted); font-weight: 400; }

  /* ─── Mini Bar ─── */
  .mini-bar {
    display: inline-block;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.6;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* ─── Summary Strip ─── */
  .summary-strip {
    display: flex;
    gap: 0;
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
  }
  .summary-item {
    flex: 1;
    text-align: center;
    position: relative;
  }
  .summary-item:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 4px;
    bottom: 4px;
    width: 1px;
    background: var(--border);
  }
  .summary-value {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 700;
  }
  .summary-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg-muted);
    margin-top: 2px;
  }

  /* ─── Actions ─── */
  .actions {
    display: flex;
    gap: 8px;
    padding: 24px 0;
  }
  .action-btn {
    flex: 1;
    padding: 14px;
    border-radius: 6px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.12s;
    border: none;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn.primary {
    background: var(--fg);
    color: var(--surface);
  }
  .action-btn.outline {
    background: transparent;
    color: var(--fg);
    border: 2px solid var(--border-strong);
  }

  /* ─── Stagger ─── */
  .reveal {
    opacity: 0;
    transform: translateY(12px);
    animation: reveal 0.4s ease forwards;
  }
  @keyframes reveal { to { opacity: 1; transform: none; } }
  .d1 { animation-delay: 0.05s; }
  .d2 { animation-delay: 0.12s; }
  .d3 { animation-delay: 0.2s; }
  .d4 { animation-delay: 0.3s; }
  .d5 { animation-delay: 0.4s; }
  .d6 { animation-delay: 0.5s; }
</style>
</head>
<body>

<nav class="tabs reveal">
  <button class="tab active">Stats</button>
  <button class="tab">Floors</button>
  <button class="tab">Walking</button>
  <button class="tab">Running</button>
</nav>

<!-- Hero -->
<div class="hero reveal d1">
  <div class="hero-row">
    <span class="hero-score">45.4</span>
    <span class="hero-unit">pts</span>
  </div>
  <div class="hero-sub">
    Today's score &mdash;
    <span class="hero-badge badge-green">&#9650; 12% vs avg</span>
  </div>
</div>

<!-- Data Grid -->
<div class="data-grid reveal d2">
  <div class="data-cell">
    <div class="data-value">10</div>
    <div class="data-label">&#8593; Up</div>
  </div>
  <div class="data-divider"></div>
  <div class="data-cell">
    <div class="data-value">7</div>
    <div class="data-label">&#8595; Down</div>
  </div>
  <div class="data-divider"></div>
  <div class="data-cell">
    <div class="data-value">6.4k</div>
    <div class="data-label">Walk m</div>
  </div>
  <div class="data-divider"></div>
  <div class="data-cell">
    <div class="data-value">2.1k</div>
    <div class="data-label">Run m</div>
  </div>
</div>

<!-- Summary -->
<div class="summary-strip reveal d3">
  <div class="summary-item">
    <div class="summary-value">11.6</div>
    <div class="summary-label">Avg</div>
  </div>
  <div class="summary-item">
    <div class="summary-value">81.5</div>
    <div class="summary-label">Total</div>
  </div>
  <div class="summary-item">
    <div class="summary-value" style="color: var(--warm);">7d &#128293;</div>
    <div class="summary-label">Streak</div>
  </div>
</div>

<!-- Week Table -->
<div class="week-section reveal d4">
  <div class="section-head">
    <span class="section-title">This Week</span>
  </div>
  <table class="week-table">
    <thead>
      <tr>
        <th>Day</th>
        <th>Floors</th>
        <th>Walk</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><span class="day-name-muted">Mon</span></td>
        <td>8</td>
        <td>1.2k</td>
        <td><span class="mini-bar" style="width:29%"></span>6.0</td>
      </tr>
      <tr>
        <td><span class="day-name-muted">Tue</span></td>
        <td>5</td>
        <td>0.8k</td>
        <td><span class="mini-bar" style="width:22%"></span>4.5</td>
      </tr>
      <tr>
        <td><span class="day-name-muted">Wed</span></td>
        <td>26</td>
        <td>3.1k</td>
        <td><span class="mini-bar" style="width:100%"></span>20.5</td>
      </tr>
      <tr>
        <td><span class="day-name">Thu</span></td>
        <td>19</td>
        <td>2.4k</td>
        <td><span class="mini-bar" style="width:76%"></span>15.5</td>
      </tr>
      <tr>
        <td><span class="day-name">Fri</span></td>
        <td>16</td>
        <td>1.9k</td>
        <td><span class="mini-bar" style="width:66%"></span>13.5</td>
      </tr>
      <tr>
        <td><span class="day-name">Sat</span></td>
        <td>19</td>
        <td>2.8k</td>
        <td><span class="mini-bar" style="width:76%"></span>15.5</td>
      </tr>
      <tr class="today">
        <td><span class="day-name">Today</span></td>
        <td>17</td>
        <td>6.4k</td>
        <td><span class="mini-bar" style="width:90%; background:var(--accent)"></span>45.4</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Actions -->
<div class="actions reveal d5">
  <button class="action-btn primary">+ Floors</button>
  <button class="action-btn outline">+ Walk</button>
  <button class="action-btn outline">+ Run</button>
</div>

</body>
</html>
